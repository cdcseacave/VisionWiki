<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="edge2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="edge3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="edge4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <!-- Base color gradients (3 stripes) -->
    <linearGradient id="base1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="base2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="base3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="#22387e"/>
  <!-- Glow -->
  <circle cx="256" cy="230" r="190" fill="url(#glow)"/>

  <!-- Bulb silhouette outline -->
  <defs>
    <linearGradient id="bulbOutline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <path d="M 256 100
           C 340 100, 380 170, 360 240
           C 350 280, 320 300, 310 340
           L 202 340
           C 192 300, 162 280, 152 240
           C 132 170, 172 100, 256 100 Z"
        stroke="url(#bulbOutline)" stroke-width="4" fill="none" opacity="1"/>

  <!-- Colored wireframe mesh (each edge / triangle edge a different gradient) -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <!-- Top triangles -->
    <path d="M 256 100 L 200 180" stroke="url(#edge1)"/>
    <path d="M 256 100 L 312 180" stroke="url(#edge2)"/>
    <path d="M 200 180 L 312 180" stroke="url(#edge3)"/>
    <path d="M 256 100 L 256 220" stroke="url(#edge4)"/>
    <path d="M 200 180 L 256 220" stroke="url(#edge2)"/>
    <path d="M 312 180 L 256 220" stroke="url(#edge1)"/>

    <!-- Middle band -->
    <path d="M 200 180 L 180 260" stroke="url(#edge4)"/>
    <path d="M 312 180 L 332 260" stroke="url(#edge3)"/>
    <path d="M 180 260 L 256 220" stroke="url(#edge3)"/>
    <path d="M 332 260 L 256 220" stroke="url(#edge4)"/>
    <path d="M 180 260 L 332 260" stroke="url(#edge2)"/>

    <!-- Lower triangles -->
    <path d="M 180 260 L 256 300" stroke="url(#edge1)"/>
    <path d="M 332 260 L 256 300" stroke="url(#edge2)"/>
    <path d="M 256 220 L 256 300" stroke="url(#edge3)"/>
    <path d="M 180 260 L 210 320" stroke="url(#edge4)"/>
    <path d="M 332 260 L 302 320" stroke="url(#edge1)"/>
    <path d="M 210 320 L 256 300" stroke="url(#edge2)"/>
    <path d="M 302 320 L 256 300" stroke="url(#edge3)"/>
    <path d="M 210 320 L 302 320" stroke="url(#edge4)"/>
  </g>

  <!-- Splat vertices -->
  <g>
    <circle cx="256" cy="100" r="5" fill="#fef3c7"/>
    <circle cx="200" cy="180" r="4" fill="#22d3ee"/>
    <circle cx="312" cy="180" r="4" fill="#ec4899"/>
    <circle cx="180" cy="260" r="4" fill="#a855f7"/>
    <circle cx="332" cy="260" r="4" fill="#fbbf24"/>
    <circle cx="256" cy="220" r="5" fill="#34d399"/>
    <circle cx="256" cy="300" r="4" fill="#f97316"/>
    <circle cx="210" cy="320" r="3" fill="#22d3ee"/>
    <circle cx="302" cy="320" r="3" fill="#ec4899"/>
  </g>

  <!-- Base: 3 colored stripes -->
  <rect x="212" y="350" width="88" height="16" rx="3" fill="url(#base1)"/>
  <rect x="220" y="372" width="72" height="14" rx="3" fill="url(#base2)"/>
  <rect x="230" y="392" width="52" height="18" rx="8" fill="url(#base3)"/>

  <!-- Idea sparks around -->
  <g stroke="#fde68a" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="90"  y1="140" x2="120" y2="155"/>
    <line x1="422" y1="140" x2="392" y2="155"/>
    <line x1="80"  y1="240" x2="115" y2="240"/>
    <line x1="432" y1="240" x2="397" y2="240"/>
    <line x1="110" y1="330" x2="135" y2="310"/>
    <line x1="402" y1="330" x2="377" y2="310"/>
  </g>
</svg>
